version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rsas-db-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rsas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rsas-api-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=rsas_db
      - DB_PORT=5432
      - JWT_SECRET=supersecretkeyrsas2024
    depends_on:
      - db

volumes:
  postgres_data:
